{% extends "base.html" %}

{% block content %}
<div class="container error-container">
    <div class="error-box">
        <div class="error-icon">
            <i class="fas fa-times-circle"></i>
        </div>
        <h1>Pagamento Cancelado</h1>
        <p>Você cancelou o processo de upgrade</p>
        
        <div class="error-details">
            <p>Se você tiver dúvidas sobre o plano Premium, entre em contato conosco.</p>
            <p>Você continuará com o plano gratuito (3 resumos por dia).</p>
        </div>
        
        <div class="error-actions">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Voltar ao Dashboard
            </a>
            <a href="{{ url_for('main.pricing') }}" class="btn btn-primary">
                <i class="fas fa-info-circle"></i> Ver Planos Novamente
            </a>
        </div>
    </div>
</div>
{% endblock %}
